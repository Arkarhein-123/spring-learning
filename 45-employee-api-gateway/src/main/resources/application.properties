spring.application.name=45-employee-api-gateway
server.port=8080

spring.cloud.gateway.server.webmvc.routes[0].id=employee-api
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://EMPLOYEE-BACKEND
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/employees/**


spring.cloud.gateway.server.webmvc.routes[1].id=EMPLOYEE-UI
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://EMPLOYEE-UI
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/ui/**


spring.cloud.gateway.server.webmvc.routes[2].id=address-api
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://ADDRESS-BACKEND
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/addresses/**


eureka.client.service-url.defaultZone=http://localhost:8083/eureka

