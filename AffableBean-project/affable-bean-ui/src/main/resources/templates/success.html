<!DOCTYPE html>
<html th:replace="~{layout/masterLayout :: layout(~{::main})}"
	xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
	<main role="main">
		<div class="container  mt-5">
			<h1 class="lead fw-bold fs-3" th:classappend="${error} ? 'text-danger' : '' ">Order Id : <span  th:text="${orderId}"></span></h1>
			<h2 class="lead fw-bold fs-3" th:classappend="${error} ? 'text-danger' : '' ">Order Status : <span th:text="${orderStatus}"></span></h2>
		</div>
		
	</main>
</body>
</html>
