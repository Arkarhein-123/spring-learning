<!DOCTYPE html>
<html th:replace="~{layout/masterLayout :: layout(~{::main})}" 
xmlns:th="http://www.thymeleaf.org">

<body>
	<main role="main">
		<div class="container mt-5">
			<a th:href="@{/add-employee}" class="btn btn-success b-5 m-3">Add Employee</a>
			<table class="table table-striped table-bordered">
				<thead>
					<tr>
						<th>Id</th>
						<th>FirstName</th>
						<th>LastName</th>
						<th>Email</th>
						<th>Phone</th>
						<th>hireDate</th>
						<th>Salary</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="emp : ${employees}">
						<td th:text="${emp.id}"></td>
						<td th:text="${emp.firstName}"></td>
						<td th:text="${emp.lastName}"></td>
						<td th:text="${emp.email}"></td>
						<td th:text="${emp.phoneNumber}"></td>
						<td th:text="${emp.hireDate}"></td>
						<td th:text="${emp.salary}"></td>
						<td><a th:href="@{/update-employee(id=${emp.id})}" class="btn btn-outline-primary">Update</a></td>
						<td><a th:href="@{/delete-employee(id=${emp.id})}" class="btn btn-outline-danger">Delete</a></td>
					</tr>
				</tbody>
			</table>
		</div>
	</main>
</body>
</html>
