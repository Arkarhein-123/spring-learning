<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/masterLayout :: layout(~{::main})}">

<body>
<main role="main">
    <div class="container mt-5">
        <div class="row">
            <h2 class="text-lg-center mb-2 fw-bold">Customer Data</h2>
            <div class="col">
                <a th:href="@{/customer-form}" class="btn btn-primary my-3">Add Customer</a>
                <div class="card">
                    <div class="card-body">
                        <table class="table table-striped table-bordered rounded">
                            <tr>
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>First Name</th>
                                        <th>Last Name</th>
                                        <th>Code</th>
                                        <th>Address</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="cus :${customers}">
                                        <td th:text="${cus.id}"></td>
                                        <td th:text="${cus.firstName}"></td>
                                        <td th:text="${cus.lastName}"></td>
                                        <td th:text="${cus.code}"></td>
                                        <td th:text="${cus.address}"></td>
                                        <td><a th:href="@{/delete-customer(id=${cus.id})}" class="btn btn-danger">Delete</a></td>
                                    </tr>
                                </tbody>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
