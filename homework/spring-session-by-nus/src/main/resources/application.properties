spring.application.name=spring-session-by-nus

# Database Connection (Fixing 'username')
spring.datasource.url=jdbc:mysql://localhost:3306/springSessionDb
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Spring Session JDBC
spring.session.store-type=jdbc
# 'always' ensures the session tables are created if they don't exist
spring.session.jdbc.initialize-schema=always