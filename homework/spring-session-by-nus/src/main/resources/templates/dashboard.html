<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">App Dashboard</a>
            <a th:href="@{/logout}" class="btn btn-outline-danger btn-sm">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="p-5 mb-4 bg-light rounded-3 shadow-sm">
            <div class="container-fluid py-2">
                <h1 class="display-5 fw-bold">Welcome, <span th:text="${user.userName}">User</span>!</h1>
                <p class="col-md-8 fs-4 text-muted">You are successfully logged in via Spring Session.</p>
            </div>
        </div>

        <div class="card">
            <div class="card-header bg-primary text-white">Your Profile Information</div>
            <div class="card-body">
                <table class="table table-hover">
                    <tbody>
                        <tr>
                            <th scope="row">Database ID</th>
                            <td th:text="${user.id}">0</td>
                        </tr>
                        <tr>
                            <th scope="row">Email Address</th>
                            <td th:text="${user.email}">N/A</td>
                        </tr>
                        <tr>
                            <th scope="row">User Name</th>
                            <td th:text="${user.userName}">N/A</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
