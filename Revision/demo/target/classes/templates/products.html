<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Product Management</title>
  <style>
    /* Using a standardized font stack for better readability [cite: 919] */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f7f6;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      margin-bottom: 30px;
    }

    h2 {
      color: #333;
      margin-top: 0;
      border-bottom: 2px solid #eee;
      padding-bottom: 10px;
    }

    /* Table Styling [cite: 121] */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th {
      text-align: left;
      background-color: #f8f9fa;
      color: #666;
      padding: 12px;
      border-bottom: 2px solid #dee2e6;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      color: #444;
    }

    /* Form Styling [cite: 147] */
    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
      color: #555;
    }

    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      box-sizing: border-box; /* Ensures padding doesn't affect width */
    }

    input[type="submit"] {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
    }

    input[type="submit"]:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Current Inventory</h2>
  <table>
    <thead>
    <tr>
      <th>Product Name</th>
      <th>Price</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${products}">
      <td th:text="${p.name}">Product Name</td>
      <td th:text="${'$' + #numbers.formatDecimal(p.price, 1, 2)}">$0.00</td>
    </tr>
    <tr th:if="${#lists.isEmpty(products)}">
      <td colspan="2" style="text-align: center; color: #999;">No products available.</td>
    </tr>
    </tbody>
  </table>
</div>

<div class="container">
  <h2>Add New Product</h2>
  <form action="/products" method="post">
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="e.g. Espresso" required>
    </div>
    <div class="form-group">
      <label for="price">Price ($)</label>
      <input type="number" id="price" name="price" step="0.01" placeholder="0.00" required>
    </div>
    <input type="submit" value="Add Product">
  </form>
</div>

</body>
</html>
