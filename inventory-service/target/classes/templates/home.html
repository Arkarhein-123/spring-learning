<!DOCTYPE html>
<html th:replace="~{layout/masterLayout :: layout(~{::main})}" xmlns:th="http://www.thymeleaf.org">

<body>
<main role="main">
	<div class="container mt-5">
		<div class="row">
			<div class="col-md-10 offset-md-1">
				<div class="card">
					<div class="card-header">
						<h5>Inventory Table</h5>
					</div>
					<table class="table table-striped table-hover table-border rounded shadow">
						<thead>
							<tr>
								<th>ProductId</th>
								<th>Product</th>
								<th>Name</th>
								<th>Quantity</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="product :${products}">
								<td th:text="${product.productId}"></td>
								<td>
								<img th:src="@{'/image/products/'+${product.name} +'.png'}" alt="Image" />
								</td>
								<td th:text="${product.name}"></td>
								<td th:text="${product.quantity}"></td>
							</tr>
						</tbody>
					</table>
				</div>
			</div>
		</div>
	</div>
</main>
</body>
</html>
