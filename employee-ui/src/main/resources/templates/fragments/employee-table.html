<!DOCTYPE html>
<html
	
	xmlns:th="http://www.thymeleaf.org"
>

<body>
	<div class="container mt-5" th:fragment="employees">
			<div class="card shadow" th:if="${!employees.isEmpty()}">
				<div class="card-header bg-primary text-white">
					<h3 class="mb-0">Employee Directory</h3>
				</div>
				<div class="card-body">
					<div class="table-responsive">
						<table class="table table-striped table-hover align-middle">
							<thead class="table-dark">
								<tr>
									<th scope="col">ID</th>
									<th scope="col">Full Name</th>
									<th scope="col">Email</th>
									<th scope="col">Phone</th>
									<th scope="col">Hired Date</th>
									<th scope="col">Salary</th>
									<th scope="col" class="text-center">Actions</th>
								</tr>
							</thead>
							<tbody>
								<!-- Iterate over the employee list -->
								<tr th:each="employee : ${employees}">
									<td th:text="${employee.id}" class="fw-bold">1</td>
									<td th:text="${employee.firstName + ' ' + employee.lastName}">John
										Doe</td>
									<td><a th:href="'mailto:' + ${employee.email}"
										th:text="${employee.email}">john@example.com</a></td>
									<td th:text="${employee.phoneNumber}">555-0123</td>
									<td
										th:text="${#temporals.format(employee.hireDate, 'dd-MMM-yyyy')}">01-Jan-2024</td>
									<td th:text="${#numbers.formatCurrency(employee.salary)}">$50,000.00</td>
									<td class="text-center">
										<div class="btn-group btn-group-sm" role="group">
											<a th:href="@{/employees/edit/{id}(id=${employee.id})}"
												class="btn btn-outline-primary">Edit</a>
											<button type="button" class="btn btn-outline-danger">Delete</button>
										</div>
									</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
	
</body>
</html>
