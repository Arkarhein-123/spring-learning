<!DOCTYPE html>
<html th:replace="~{layout/masterLayout :: layout(~{::main})}"
	xmlns:th="http://www.thymeleaf.org">
<body>
	<main role="main">
		<div class="container mt-5">
			<div class="row">
				<div class="col">
					<a th:href="@{/customer-form}" class="btn btn-primary my-3">Add
						Customer</a>
					<div class="card">
						<div class="card-body">
							<table class="table table-striped table-bordered rounded">
								<thead>
									<tr>
										<th>ID</th>
										<th>First Name</th>
										<th>Last Name</th>
										<th>Address</th>
										<th>Code</th>
										<th>Action</th>
									</tr>
								</thead>
								<tbody>
									<tr th:each="cus : ${customers}">
										<td th:text="${cus.id}"></td>
										<td th:text="${cus.firstName}"></td>
										<td th:text="${cus.lastName}"></td>
										<td th:text="${cus.address}"></td>
										<td th:text="${cus.code}"></td>
										<td><a th:href="@{'/delete-customer?id='+${cus.id}}"
											class="btn btn-outline-danger">Delete</a></td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</div>
	</main>
</body>
</html>
