<!DOCTYPE html>
<html th:replace="~{layout/masterLayout :: layout(~{::main})}"
	xmlns:th="http://www.thymeleaf.org">
<body>
	<main role="main">
		<div class="container mt-5">
			<div class="row">
				<div class="col">
					<div class="card shadow rounded">
						<div class="card-header">
							<h5>Customer Form</h5>
						</div>
						<div class="card-body">
							<form th:action="@{/customer-form}" method="post"
								th:object="${customer}">
								<div class="row">
									<div class="col">
										<div class="mb-3">
											<label class="form-label">First Name</label> <input
												type="text" th:field="*{firstName}" class="form-control" />
										</div>
									</div>
									<div class="col">
										<div class="mb-3">
											<label class="form-label">Last Name</label> <input
												type="text" th:field="*{lastName}" class="form-control" />
										</div>
									</div>
								</div>
								<div class="row">
									<div class="col">
										<div class="mb-3">
											<label class="form-label">Address</label> <input type="text"
												th:field="*{address}" class="form-control" />
										</div>
									</div>
									<div class="col">
										<div class="mb-3">
											<label class="form-label">Code</label> <input type="text"
												th:field="*{code}" class="form-control" />
										</div>
									</div>
								</div>
								<input type="submit" value="Add Customer"
									class="btn btn-primary w-100" />
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
	</main>
</body>
</html>
