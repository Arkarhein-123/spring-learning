<!DOCTYPE html>
<html th:replace="~{layout/masterLayout :: layout(~{::main})}"
	xmlns:th="http://www.thymeleaf.org">
<body>
	<main role="main">
		<div class="container mt-5">
			<div class="row">
				<div class="col">
					<a th:href="@{/department-form}" class="btn btn-primary my-3">Add
						Department</a>
					<div class="card">
						<div class="card-body">
							<table class="table table-striped table-bordered rounded">
								<thead>
									<tr>
										<th>ID</th>
										<th>Name</th>
										<th>Country</th>
										<th>Code</th>
										<th>Action</th>
									</tr>
								</thead>
								<tbody>
									<tr th:each="dep : ${departments}">
										<td th:text="${dep.id}"></td>
										<td th:text="${dep.name}"></td>
										<td th:text="${dep.country}"></td>
										<td th:text="${dep.code}"></td>
										<td><a th:href="@{'/delete-department?id='+${dep.id}}"
											class="btn btn-outline-danger">Delete</a></td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</div>
	</main>
</body>
</html>
