<!DOCTYPE html>
<html th:fragment="layout(main)" xmlns:th="http://www.thymeleaf.org"
 xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
<meta charset="UTF-8">
<title>Master Layout Page</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
	rel="stylesheet"
	integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
	crossorigin="anonymous">
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
	integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
	crossorigin="anonymous"></script>
</head>
<body>

	<nav class="navbar navbar-expand-md navbar-dark bg-primary text-white">
		<a th:href="@{/}" class="navbar-brand">Security Master</a>
		<button class="navbar-toggler" type="button" data-bs-toggle="collapse"
			data-bs-target="#myNav">
			<span class="navbar-toggler-icon"></span>
		</button>
		<div class="collapse navbar-collapse" id="myNav">
			<ul class="navbar-nav ms-auto">
				<li class="nav-item">
					<a class="nav-link" th:href="@{/}">Home</a>
				</li>
				<li class="nav-item">
					<a class="nav-link" th:href="@{/list-customers}">Customers</a>
				</li>
				<li class="nav-item">
					<a class="nav-link" th:href="@{/list-employees}">Employees</a>
				</li>
				<li class="nav-item">
					<a class="nav-link" th:href="@{/list-departments}">Departments</a>
				</li>
				<li sec:authorize="isAuthenticated()" class="nav-item">
					<a href="javascript:document.logoutForm.submit()" class="nav-link">Logout</a>
					<form name="logoutForm" th:action="@{/logout}" 
					method="post" hidden>
						<input type="submit" value="Logout" hidden/>
					</form>
				</li>
			</ul>
		</div>
	</nav>

	<div th:replace="${main}"></div>
</body>
</html>
