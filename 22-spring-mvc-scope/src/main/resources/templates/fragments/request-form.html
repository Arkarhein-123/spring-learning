<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
	<div th:fragment="request" class="container mt-3">
		<div class="card">
			<div class="card-header">
				<h2>RequestScoped</h2>
				<h4>
					RequestValue: <span th:text="${requestValue}"></span>
				</h4>
			</div>
			<div class="card-body">
				<form th:action="@{/add-request-value}" method="post">
					<div class="mb-3">
						<label for="" class="form-label">Request Value</label>
						<input
							type="text" class="form-control" name="requestValue" />
						<!-- name value goes to @RequestParam -->
					</div>

					<input type="submit" value="Add Request Value"
						class="btn btn-primary w-100" />
				</form>
			</div>
		</div>
	</div>
</body>

</html>
