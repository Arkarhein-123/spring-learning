<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/masterLayout :: layout(~{::main})}">

<body>
    <main role="main">
        <div class="container mt-5">
            <h1 class="text-center text-danger">Error Page</h1>
            <p class="lead">You got Error!</p>
            <p>Status Code : <span th:text="${statusCode}"></span></p>
            <p>Error Message : <span th:text="${errorMessage}"></span></p>
            <p>You want to go <a th:href="@{/}">Home</a> </p>
        </div>
    </main>
</body>
</html>
