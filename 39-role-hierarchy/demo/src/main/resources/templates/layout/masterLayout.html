<!DOCTYPE html>
<html lang="en"
      th:fragment="layout(main)"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>Master Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
</head>
<body>
    <div class="navbar navbar-expand-md navbar-dark bg-primary text-white">
        <a th:href="@{/}" class="navbar-brand">Security Master</a>
        <button role="button" class="navbar-toggler"
                data-bs-target="#myNav" data-bs-toggle="collapse">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div id="myNav" class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a th:href="@{/}" class="nav-link">Home</a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/list-customers}" class="nav-link">Customers</a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/}" class="nav-link">Employees</a>
                </li>
                <li class="nav-item">
                    <a th:href="@{/list-departments}" class="nav-link">Departments</a>
                </li>
                <li sec:authorize="isAuthenticated()" class="nav-item">
                    <a href="javascript:document.logoutForm.submit()" class="nav-link">Logout</a>
                    <form name="logoutForm" th:action="@{/logout}" method="post" hidden>
                        <input type="submit" value="Logout" hidden>
                    </form>
                </li>
            </ul>
        </div>
    </div>

    <div th:replace="${main}"></div>
</body>
</html>
